name: safe_action_button
description: >
  A production-ready Flutter package that provides a highly configurable SafeActionButton
  system. Prevents duplicate taps, duplicate async API calls, and accidental multiple
  executions with debounce, cooldown, and loading state management.
version: 1.0.0
homepage: https://github.com/min25/safe_action_button
repository: https://github.com/min25/safe_action_button
issue_tracker: https://github.com/min25/safe_action_button/issues
documentation: https://pub.dev/documentation/safe_action_button/latest/

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
